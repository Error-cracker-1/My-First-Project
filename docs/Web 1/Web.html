<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='0.9em' font-size='56'%3E🤡%3C/text%3E%3C/svg%3E" />

    <title>you are an idiot!</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: "Comic Sans MS", cursive, sans-serif;
        cursor: wait;
      }

      .container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        background-color: red;
        color: black;
        font-size: 3rem;
        font-weight: bold;
        animation: flash 0.1s infinite;
      }

      @keyframes flash {
        0% {
          background-color: red;
          color: black;
        }

        50% {
          background-color: aquamarine;
          color: black;
        }

        100% {
          background-color: red;
          color: black;
        }
      }

      .controls {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 1000;
      }

      .menuButton {
        width: 48px;
        height: 48px;
        border: none;
        border-radius: 999px;
        font-size: 1.6rem;
        font-weight: bold;
        cursor: pointer;
        color: white;
        background: rgba(0, 0, 0, 0.55);
        -webkit-backdrop-filter: blur(6px);
        backdrop-filter: blur(6px);
      }

      .menuPanel {
        position: absolute;
        top: 58px;
        right: 0;
        min-width: 220px;
        display: none;
        flex-direction: column;
        gap: 10px;
        padding: 12px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        -webkit-backdrop-filter: blur(6px);
        backdrop-filter: blur(6px);
      }

      .controls.open .menuPanel {
        display: flex;
      }

      .menuRow {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .menuPanel button {
        padding: 10px 12px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
      }

      .menuPanel label {
        font-size: 1rem;
      }

      #volumeSlider {
        width: 100%;
      }
    </style>
    <script>
      var isBouncing = true;
      var isFlashing = true;
      var isConsoleSpamRunning = true;
      var consoleSpamInterval;
      function bounce() {
        if (!isBouncing) return;
        var container = document.querySelector(".container");
        var x = Math.random() * 50 - 25;
        var y = Math.random() * 50 - 25;
        container.style.transform = "translate(" + x + "px, " + y + "px)";
        setTimeout(bounce, 5);
      }
      window.onload = function () {
        bounce();
        var audio = document.getElementById("annoyingSound");
        var slider = document.getElementById("volumeSlider");
        var muteButton = document.getElementById("muteButton");
        var stopBounceButton = document.getElementById("stopButton");
        var stopFlashButton = document.getElementById("flashButton");
        var stopConsoleButton = document.getElementById("consoleSpamButton");
        var menuButton = document.getElementById("menuButton");
        var controls = document.querySelector(".controls");
        var container = document.querySelector(".container");

        stopBounceButton.addEventListener("click", function () {
          isBouncing = !isBouncing;
          if (isBouncing) {
            bounce();
            this.textContent = "Stop Bouncing";
          } else {
            container.style.transform = "none";
            this.textContent = "Start Bouncing";
          }
        });

        stopFlashButton.addEventListener("click", function () {
          isFlashing = !isFlashing;
          if (isFlashing) {
            container.style.animation = "flash 0.1s infinite";
            this.textContent = "Stop Flashing";
          } else {
            container.style.animation = "none";
            container.style.backgroundColor = "red";
            container.style.color = "black";
            this.textContent = "Start Flashing";
          }
        });

        stopConsoleButton.addEventListener("click", function () {
          isConsoleSpamRunning = !isConsoleSpamRunning;
          if (isConsoleSpamRunning) {
            startConsoleSpam();
            this.textContent = "Stop Console Spam";
          } else {
            clearInterval(consoleSpamInterval);
            this.textContent = "Start Console Spam";
          }
        });

        menuButton.addEventListener("click", function (event) {
          event.stopPropagation();
          controls.classList.toggle("open");
        });

        document.addEventListener("click", function (event) {
          if (!controls.contains(event.target)) {
            controls.classList.remove("open");
          }
        });

        slider.addEventListener("input", function () {
          var v = parseFloat(this.value);
          audio.volume = v;
          if (audio.muted && v > 0) {
            audio.muted = false;
            if (muteButton) muteButton.textContent = "Mute";
          }
        });

        slider.value = audio.volume;

        if (muteButton) muteButton.textContent = audio.muted ? "Unmute" : "Mute";

        audio.addEventListener("volumechange", function () {
          slider.value = audio.volume;
          if (muteButton) muteButton.textContent = audio.muted ? "Unmute" : "Mute";
        });

        if (muteButton) {
          muteButton.addEventListener("click", function () {
            audio.muted = !audio.muted;
            this.textContent = audio.muted ? "Unmute" : "Mute";
          });
        }

        document.addEventListener("keydown", function (e) {
          try {
            if (!e.key) return;
            if (e.key.toLowerCase() !== "m") return;
            var active = document.activeElement;
            var tag = active && active.tagName;
            if (
              active &&
              (tag === "INPUT" || tag === "TEXTAREA" || active.isContentEditable)
            )
              return;
            audio.muted = !audio.muted;
            if (muteButton) muteButton.textContent = audio.muted ? "Unmute" : "Mute";
          } catch (err) {
            console.error(err);
          }
        });

        function startConsoleSpam() {
          clearInterval(consoleSpamInterval);
          consoleSpamInterval = setInterval(function () {
            console.log(
              "%c YOU ARE AN IDIOT ",
              "background: red; color: yellow; font-size: x-large",
            );
            console.error("CRITICAL ERROR: USER IDIOT DETECTED");
            console.warn("System instability due to idiot user");
          }, 200);
        }

        startConsoleSpam();

        audio
          .play()
          .then(() => console.log("Audio started automatically"))
          .catch(function (error) {
            console.warn("Autoplay blocked. Waiting for interaction.", error);
            function play() {
              audio
                .play()
                .then(() => {
                  console.log("Audio started via interaction.");
                  ["click", "mousemove", "keydown", "touchstart"].forEach((e) =>
                    document.removeEventListener(e, play),
                  );
                })
                .catch((e) => console.error("Play failed:", e));
            }
            ["click", "mousemove", "keydown", "touchstart"].forEach((e) =>
              document.addEventListener(e, play),
            );
          });
      };
    </script>
